<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversora IPSFA - Sistema de Créditos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div id="tsparticles"></div>

        <div class="login-bg">
            <div class="circles">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
        </div>

        <div class="login-content">
            <div class="login-box">
                
                <div class="logo-wrapper">
                    <div class="brand-logo-container">
                        <img src="assets/logo.png" alt="Inversora IPSFA" class="main-corporate-logo">
                    </div>
                </div>

                <div class="login-header">
                    <h1 class="login-title">Sistema de Créditos</h1>
                    <p class="login-subtitle">Gestión financiera empresarial</p>
                </div>

                <div id="loginAlert" class="alert"></div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope field-icon"></i>
                            <input type="email" id="login-email" placeholder="ejemplo@gmail.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="login-password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock field-icon"></i>
                            <input type="password" id="login-password" placeholder="******" required autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" id="btn-login" class="btn-login">
                        <span>Ingresar al Sistema</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </form>

                <div class="login-footer">
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="login-footer-bottom">
                    <p>Diseñado por: Gerencia de Ventas 2026</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
